<!DOCTYPE html>

        .category-scroll::-webkit-scrollbar { height: 4px; }
        .category-scroll::-webkit-scrollbar-track { bg: #f1f1f1; }

        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

            .modal-animate {
                transform: translateY(100%);

            }
            .modal-active .modal-animate {
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-[#f8f9fa] text-gray-900 antialiased font-sans selection:bg-blue-500 selection:text-white">

                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400 text-[11px]"></i>

            <button onclick="toggleCartModal()" class="relative h-11 px-4 text-gray-800 hover:text-blue-600 transition-colors cursor-pointer flex items-center justify-center gap-2 bg-gray-50 rounded-xl border border-gray-100 shadow-2xs">

        <div class="px-4 pb-3 bg-white block md:hidden">

    <div id="product-modal" class="fixed inset-0 bg-black/60 z-50 flex items-end md:items-center justify-center p-0 md:p-4 backdrop-blur-xs transition-opacity duration-300 opacity-0 pointer-events-none hidden" onclick="closeModal()">

            <div id="modal-scroll-body" class="grow overflow-y-auto p-4 md:p-6 pb-26 md:pb-24">
                
                <div id="modal-step-1" class="flex flex-col md:flex-row gap-4 md:gap-6">

                        <div class="w-full aspect-square max-h-[32vh] md:max-h-none overflow-hidden bg-gray-50 rounded-2xl relative flex items-center justify-center p-2 border border-gray-100 shadow-2xs">
                            <img id="modal-main-image" src="" onclick="openLightbox()" class="w-full h-full object-contain transition-all duration-300 cursor-zoom-in" title="タップで拡大表示">

                        </div>
                        <div id="modal-thumbnails" class="flex gap-1.5 mt-2 overflow-x-auto category-scroll py-1 justify-center"></div>
                    </div>
                    
                    <div class="w-full md:w-1/2 flex flex-col justify-between space-y-4">
                        <div class="space-y-3.5">

                            <div class="text-2xl md:text-3xl font-black text-amber-600 tracking-tight flex items-baseline border-b border-gray-50 pb-2">
                                <span id="price-text">¥0</span>
                            </div>
                            
                            <div class="bg-slate-50 p-4 rounded-2xl border-l-4 border-gray-900 shadow-3xs">
                                <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-1">Description / 商品説明</span>

                        </div>
                    </div>
                </div>

                <div id="modal-step-2" class="hidden max-w-md mx-auto py-2 md:py-6 space-y-6">
                    <button onclick="goToStep(1)" class="text-xs font-black text-gray-400 hover:text-gray-900 flex items-center gap-1.5 cursor-pointer bg-gray-50 px-3 py-1.5 rounded-lg transition-all">
                        <i class="fa-solid fa-chevron-left text-[10px]"></i> 商品詳細に戻る

                    <div class="border-b border-gray-100 pb-4 flex items-center gap-3">
                        <img id="modal-step2-mini-img" src="" class="w-12 h-12 object-contain bg-gray-50 rounded-lg border border-gray-100">

                    <div class="space-y-2">
                        <span class="text-xs font-black text-gray-500 uppercase tracking-widest block"><i class="fa-solid fa-ruler mr-1 text-gray-400"></i> サイズを選択</span>

                    <div class="space-y-2">

                        <div class="flex items-center gap-1">

                            <input type="number" id="modal-qty" value="1" min="1" readonly class="w-14 h-11 border border-gray-200 rounded-xl text-center font-black text-base bg-white focus:outline-hidden">
                            <button onclick="changeModalQty(1)" class="w-11 h-11 border border-gray-200 rounded-xl flex items-center justify-center font-bold text-gray-600 bg-gray-50 active:bg-gray-200 transition-colors cursor-pointer text-lg">+</button>
                        </div>

            <div class="absolute bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md p-4 border-t border-gray-100 flex gap-2 z-20">

                    閉じる

    <div id="lightbox-modal" class="fixed inset-0 bg-black/95 z-60 flex items-center justify-center p-4 backdrop-blur-md hidden transition-opacity duration-300 opacity-0" onclick="closeLightbox()">

            <i class="fa-solid fa-xmark"></i>

        <button onclick="event.stopPropagation(); prevImage();" class="absolute left-4 top-1/2 -translate-y-1/2 bg-white/10 hover:bg-white/20 text-white w-12 h-12 rounded-full flex items-center justify-center transition-all cursor-pointer z-10 active:scale-90">

        <button onclick="event.stopPropagation(); nextImage();" class="absolute right-4 top-1/2 -translate-y-1/2 bg-white/10 hover:bg-white/20 text-white w-12 h-12 rounded-full flex items-center justify-center transition-all cursor-pointer z-10 active:scale-90">

    <div id="cart-modal" class="fixed inset-0 bg-black/60 z-50 flex items-end md:items-center justify-center p-0 md:p-4 backdrop-blur-sm hidden" onclick="toggleCartModal()">
        <div class="bg-white w-full md:w-full md:max-w-md rounded-t-3xl md:rounded-2xl p-5 shadow-2xl flex flex-col max-h-[85vh]" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between border-b border-gray-100 pb-3">
                <h3 class="font-black text-base text-gray-900"><i class="fa-solid fa-bag-shopping mr-1"></i> 現在のカート</h3>
                <button onclick="toggleCartModal()" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-gray-600 cursor-pointer"><i class="fa-solid fa-xmark text-base"></i></button>
            </div>
            
            <div id="cart-list" class="grow overflow-y-auto py-3 space-y-2.5 no-scrollbar"></div>

            <div class="border-t border-gray-100 pt-4 space-y-3 bg-gray-50 -mx-5 -mb-5 p-5 rounded-b-t-none md:rounded-b-2xl">
                <div class="bg-amber-50 border border-amber-100 text-amber-900 rounded-xl p-3 text-[11px] leading-snug">
                    <span class="font-black text-amber-800"><i class="fa-solid fa-triangle-exclamation"></i> このサイトでは注文できません。</span><br>
                    下のコードをコピーして、公式Discordへ貼り付けて注文を完了させてください。
                </div>

                <div class="flex gap-2">
                    <input type="text" id="order-string-input" readonly value="カートが空です" 
                           class="bg-white border border-gray-200 rounded-xl px-3 h-10 text-[11px] font-mono grow text-gray-600 focus:outline-hidden select-all">
                    <button onclick="copyOrderString()" class="bg-gray-900 text-white px-4 h-10 rounded-xl text-xs font-bold hover:bg-gray-800 cursor-pointer transition-colors shrink-0">
                        コピー
                    </button>
                </div>

                <a href="https://discord.gg/xbWMtzUbZB" target="_blank" class="w-full bg-[#5865F2] hover:bg-[#4752C4] text-white font-black h-12 rounded-xl flex items-center justify-center gap-1.5 transition-all shadow-lg shadow-[#5865F2]/10 cursor-pointer text-xs">
                    <i class="fa-brands fa-discord text-base"></i> Discordへ貼り付けて注文する
                </a>
            </div>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = '1YwGSjOtNAsKnxCg6afUv2nZPG0h6d7VyFat1ai3w07A';
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=responseHandler:loadData`;

        let products = [];
        let cart = [];
        let currentCategory = 'すべて';
        let searchQuery = '';
        let activeProduct = null;
        let selectedSize = '';
        let currentImageIdx = 0;
        let currentStep = 1;

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgClass = type === 'success' ? 'bg-emerald-600' : 'bg-rose-600';
            const icon = type === 'success' ? '<i class="fa-solid fa-circle-check"></i>' : '<i class="fa-solid fa-circle-exclamation"></i>';

            toast.className = `${bgClass} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-2 text-xs font-bold transition-all duration-300 opacity-0 translate-y-2 pointer-events-auto`;
            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);

            setTimeout(() => toast.classList.remove('opacity-0', 'translate-y-2'), 10);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function cleanText(str) {
            if (!str) return '';
            return String(str).toLowerCase().replace(/[！-～]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).trim();
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedCart = localStorage.getItem('topland_cart');
            if (savedCart) { try { cart = JSON.parse(savedCart); } catch(e) { cart = []; } }

            const script = document.createElement('script');
            script.src = url;
            document.body.appendChild(script);

            const searchHandler = (e) => { searchQuery = e.target.value; renderProducts(); };
            document.getElementById('search-input').addEventListener('input', searchHandler);
            document.getElementById('search-input-mobile').addEventListener('input', searchHandler);
        });

        function loadData(data) {
            try {
                const rows = data.table.rows;
                products = [];
                rows.forEach(row => {
                    const id = row.c[0] ? String(row.c[0].v).trim() : 'N/A';
                    const name = row.c[1] ? row.c[1].v : '';
                    const category = row.c[2] ? row.c[2].v : '';
                    const imageStr = row.c[3] ? row.c[3].v : '';
                    const price = row.c[4] ? row.c[4].v : '価格未定';
                    const description = row.c[5] ? row.c[5].v : '';
                    const sizesStr = row.c[6] ? String(row.c[6].v) : '';
                    const status = row.c[7] ? String(row.c[7].v).trim() : '非公開';

                    const images = imageStr.split(',').map(img => img.trim()).filter(img => img);
                    const sizes = sizesStr ? sizesStr.split(',').map(s => s.trim()).filter(s => s) : [];

                    if (name && name !== 'name' && status !== '非公開') {
                        products.push({ id, name, category, images, price, description, sizes, status });
                    }
                });

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('product-grid').classList.remove('hidden');
                initCategories();
                renderProducts();
                updateCart(); 
            } catch (e) {
                document.getElementById('loading').innerText = '同期に失敗しました。';
            }
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            const noResults = document.getElementById('no-results');
            grid.innerHTML = '';

            const words = cleanText(searchQuery).split(/\s+/).filter(w => w);
            const filtered = products.filter(product => {
                const matchesCategory = (currentCategory === 'すべて' || product.category === currentCategory);
                if (!matchesCategory) return false;
                const targetText = cleanText(`${product.name} ${product.category} ${product.id} ${product.description}`);
                return words.every(word => targetText.includes(word));
            });

            if (filtered.length === 0) { noResults.classList.remove('hidden'); return; }
            noResults.classList.add('hidden');

            filtered.forEach(product => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl overflow-hidden border border-gray-100 active:scale-98 transition-all duration-200 flex flex-col justify-between cursor-pointer group relative shadow-2xs hover:shadow-xs";
                card.onclick = () => openModal(product);
                
                let statusBadge = product.status === '生産中・準備中' ? `<span class="absolute top-2 left-2 z-10 bg-amber-500 text-white text-[10px] font-black px-2.5 py-1 rounded-lg shadow-md border border-amber-400/20">準備中</span>` : '';

                card.innerHTML = `
                    <div>
                        <div class="aspect-square bg-gray-50 overflow-hidden relative flex items-center justify-center p-1">
                            ${statusBadge}
                            <img src="${product.images[0] || 'https://placehold.co/400?text=No+Image'}" class="w-full h-full object-contain">
                        </div>
                        <div class="p-3">
                            <span class="text-[8px] font-black text-gray-400 uppercase tracking-widest block">${product.category}</span>
                            <h2 class="text-xs font-bold text-gray-900 mt-0.5 line-clamp-2 min-h-[2.2rem] leading-tight">${product.name}</h2>
                        </div>
                    </div>
                    <div class="p-3 pt-0 flex items-end justify-between">
                        <span class="text-base md:text-lg font-black text-amber-600 tracking-tight">${product.price}</span>
                        <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded">詳細</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function initCategories() {
            const pcList = document.getElementById('pc-category-list');
            const mobileList = document.getElementById('mobile-category-list');
            pcList.innerHTML = ''; mobileList.innerHTML = '';
            const categories = [...new Set(products.map(p => p.category))].filter(Boolean);
            
            categories.forEach(cat => {
                const pcBtn = document.createElement('button');
                pcBtn.onclick = () => filterCategory(cat, pcBtn, false);
                pcBtn.className = "w-full text-left flex items-center gap-1.5 px-3.5 h-9 rounded-xl text-xs font-medium text-gray-600 bg-gray-100 pc-cat-btn transition-all cursor-pointer";
                pcBtn.innerHTML = `<i class="fa-solid fa-tag text-gray-400 text-[10px]"></i> ${cat}`;
                pcList.appendChild(pcBtn);

                const mobileBtn = document.createElement('button');
                mobileBtn.onclick = () => filterCategory(cat, mobileBtn, true);
                mobileBtn.className = "w-full text-left px-3 h-9 rounded-lg text-xs font-medium text-gray-600 bg-gray-50 mobile-cat-btn flex items-center gap-2";
                mobileBtn.innerHTML = `<i class="fa-solid fa-tag text-gray-400 text-[11px]"></i> ${cat}`;
                mobileList.appendChild(mobileBtn);
            });
        }

        function toggleMobileCategoryMenu() {
            const dropdown = document.getElementById('mobile-category-dropdown');
            const arrow = document.getElementById('mobile-menu-arrow');
            const isHidden = dropdown.classList.contains('hidden');
            dropdown.classList.toggle('hidden');
            arrow.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function filterCategory(category, element, isMobile) {
            currentCategory = category;
            if (isMobile) {
                document.getElementById('mobile-current-category').innerText = category;
                document.querySelectorAll('.mobile-cat-btn').forEach(btn => btn.className = "w-full text-left px-3 h-9 rounded-lg text-xs font-medium text-gray-600 bg-gray-50 mobile-cat-btn flex items-center gap-2");
                element.className = "w-full text-left px-3 h-9 rounded-lg text-xs font-bold bg-gray-900 text-white mobile-cat-btn flex items-center gap-2";
                toggleMobileCategoryMenu();
            } else {
                document.querySelectorAll('.pc-cat-btn').forEach(btn => btn.className = "w-full text-left flex items-center gap-1.5 px-3.5 h-9 rounded-xl text-xs font-medium text-gray-600 bg-gray-100 pc-cat-btn transition-all cursor-pointer");
                element.className = "w-full text-left flex items-center gap-1.5 px-3.5 h-9 rounded-xl text-xs font-bold bg-gray-900 text-white pc-cat-btn transition-all cursor-pointer";
            }
            renderProducts();
        }

        function openModal(product) {
            activeProduct = product;
            selectedSize = '';
            currentImageIdx = 0;
            document.getElementById('modal-qty').value = 1;

            updateModalImage();

            let nameHtml = `<span class="text-[10px] font-black tracking-widest text-blue-600 bg-blue-50 px-2 py-0.5 rounded uppercase inline-flex items-center mr-2 select-none align-middle">${product.category}</span>`;
            if (product.status === '生産中・準備中') {
                nameHtml += `<span class="text-[10px] font-black tracking-wider text-amber-800 bg-amber-100 border border-amber-200 px-2 py-0.5 rounded-md inline-flex items-center mr-2 select-none align-middle">準備中</span>`;
            }
            nameHtml += `<span class="align-middle text-gray-900 font-black">${product.name}</span>`;
            document.getElementById('modal-name').innerHTML = nameHtml;

            document.getElementById('price-text').innerText = product.price;
            document.getElementById('modal-description').innerText = product.description;
            
            const thumbContainer = document.getElementById('modal-thumbnails');
            thumbContainer.innerHTML = '';
            product.images.forEach((imgUrl, idx) => {
                const img = document.createElement('img');
                img.src = imgUrl;
                img.className = `w-11 h-11 object-contain bg-white rounded-lg border-2 shrink-0 transition-all ${idx === 0 ? 'border-gray-900 opacity-100 scale-105' : 'border-gray-100 opacity-60'}`;
                img.onclick = () => { currentImageIdx = idx; updateModalImage(); };
                thumbContainer.appendChild(img);
            });

            document.getElementById('modal-step2-mini-img').src = product.images[0] || 'https://placehold.co/400?text=No+Image';
            document.getElementById('modal-step2-name').innerText = product.name;
            document.getElementById('modal-step2-price').innerText = product.price;

            const sizeContainer = document.getElementById('modal-size-container');
            sizeContainer.innerHTML = '';
            if (product.sizes.length === 0) {
                sizeContainer.innerHTML = `<span class="text-xs font-bold text-gray-500 bg-gray-100 px-3 py-2 rounded-xl">フリーサイズ (FREE)</span>`;
                selectedSize = 'FREE';
            } else {
                product.sizes.forEach(size => {
                    const btn = document.createElement('button');
                    btn.innerText = size;
                    btn.className = "min-w-[46px] h-11 px-3.5 border border-gray-200 text-xs font-black rounded-xl hover:bg-gray-50 active:scale-95 cursor-pointer transition-all size-btn flex items-center justify-center bg-white text-gray-800";
                    btn.onclick = () => {
                        sizeContainer.querySelectorAll('.size-btn').forEach(b => b.className = "min-w-[46px] h-11 px-3.5 border border-gray-200 text-xs font-black rounded-xl hover:bg-gray-50 active:scale-95 cursor-pointer transition-all size-btn flex items-center justify-center bg-white text-gray-800");
                        btn.className = "min-w-[46px] h-11 px-3.5 bg-gray-900 border border-gray-900 text-white text-xs font-black rounded-xl cursor-pointer size-btn shadow-md flex items-center justify-center scale-102";
                        selectedSize = size;
                    };
                    sizeContainer.appendChild(btn);
                });
            }

            goToStep(1);

            const modalEl = document.getElementById('product-modal');
            modalEl.classList.remove('hidden');
            setTimeout(() => {
                modalEl.classList.add('modal-active');
                modalEl.classList.remove('opacity-0');
                modalEl.classList.add('opacity-100');
                modalEl.style.pointerEvents = 'auto';
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        function goToStep(step) {
            currentStep = step;
            const step1 = document.getElementById('modal-step-1');
            const step2 = document.getElementById('modal-step-2');
            const primaryBtn = document.getElementById('modal-primary-btn');
            
            document.getElementById('modal-scroll-body').scrollTop = 0;

            if (activeProduct && activeProduct.status === '生産中・準備中') {
                primaryBtn.innerHTML = `ただいま準備中です`;
                primaryBtn.className = "w-3/4 md:w-full bg-gray-200 text-gray-400 font-bold h-12 rounded-xl flex items-center justify-center text-xs shadow-none pointer-events-none";
                step1.classList.remove('hidden');
                step2.classList.add('hidden');
                return;
            }

            if (step === 1) {
                step1.classList.remove('hidden');
                step2.classList.add('hidden');
                primaryBtn.innerHTML = `サイズ・数量を選ぶ <i class="fa-solid fa-chevron-right text-[10px]"></i>`;
                primaryBtn.className = "w-3/4 md:w-full bg-gray-900 hover:bg-gray-800 text-white font-black h-12 rounded-xl transition-all flex items-center justify-center gap-2 cursor-pointer text-xs md:text-sm shadow-lg shadow-gray-900/10 active:scale-[0.98]";
            } else {
                step1.classList.add('hidden');
                step2.classList.remove('hidden');
                primaryBtn.innerHTML = `<i class="fa-solid fa-plus text-xs"></i> カートに追加する`;
                primaryBtn.className = "w-3/4 md:w-full bg-blue-600 hover:bg-blue-700 text-white font-black h-12 rounded-xl transition-all flex items-center justify-center gap-2 cursor-pointer text-xs md:text-sm shadow-lg shadow-blue-600/10 active:scale-[0.98]";
            }
        }

        function handlePrimaryAction() {
            if (currentStep === 1) {
                goToStep(2);
            } else {
                addToCart();
            }
        }

        // 連動型画像アップデートシステム（詳細画面＆拡大画面をダブル同期）
        function updateModalImage() {
            if (!activeProduct || activeProduct.images.length === 0) {
                const noImg = 'https://placehold.co/400?text=No+Image';
                document.getElementById('modal-main-image').src = noImg;
                document.getElementById('lightbox-image').src = noImg;
                return;
            }
            
            const targetSrc = activeProduct.images[currentImageIdx];
            document.getElementById('modal-main-image').src = targetSrc;
            document.getElementById('lightbox-image').src = targetSrc; // 拡大画面も同期

            const thumbs = document.getElementById('modal-thumbnails').querySelectorAll('img');
            thumbs.forEach((t, idx) => {
                t.className = idx === currentImageIdx 
                    ? "w-11 h-11 object-contain bg-white rounded-lg border-2 border-gray-900 opacity-100 scale-105 shrink-0 transition-all shadow-3xs"
                    : "w-11 h-11 object-contain bg-white rounded-lg border-2 border-gray-100 opacity-50 shrink-0 transition-all";
            });
        }

        function nextImage() {
            if (!activeProduct || activeProduct.images.length <= 1) return;
            currentImageIdx = (currentImageIdx + 1) % activeProduct.images.length;
            updateModalImage();
        }

        function prevImage() {
            if (!activeProduct || activeProduct.images.length <= 1) return;
            currentImageIdx = (currentImageIdx - 1 + activeProduct.images.length) % activeProduct.images.length;
            updateModalImage();
        }

        // フルスクリーン拡大（ライトボックス）起動用関数
        function openLightbox() {
            if (!activeProduct || activeProduct.images.length === 0) return;
            const lightbox = document.getElementById('lightbox-modal');
            lightbox.classList.remove('hidden');
            setTimeout(() => {
                lightbox.classList.remove('opacity-0');
                lightbox.classList.add('opacity-100');
            }, 10);
        }

        // フルスクリーン拡大（ライトボックス）終了用関数
        function closeLightbox() {
            const lightbox = document.getElementById('lightbox-modal');
            lightbox.classList.remove('opacity-100');
            lightbox.classList.add('opacity-0');
            setTimeout(() => lightbox.classList.add('hidden'), 300);
        }

        function changeModalQty(val) {
            const qtyInput = document.getElementById('modal-qty');
            let nextVal = parseInt(qtyInput.value) + val;
            if (nextVal >= 1) qtyInput.value = nextVal;
        }

        function changeCartQty(index, val) {
            let nextVal = cart[index].qty + val;
            if (nextVal >= 1) { cart[index].qty = nextVal; } else { cart.splice(index, 1); }
            saveCartToStorage(); updateCart();
        }

        function closeModal() {
            const modalEl = document.getElementById('product-modal');
            modalEl.classList.remove('modal-active');
            modalEl.classList.remove('opacity-100');
            modalEl.classList.add('opacity-0');
            modalEl.style.pointerEvents = 'none';
            setTimeout(() => modalEl.classList.add('hidden'), 300);
            document.body.style.overflow = '';
        }

        function addToCart() {
            if (!selectedSize) { showToast('サイズを選択してください！', 'error'); return; }
            const qty = parseInt(document.getElementById('modal-qty').value);
            if (activeProduct) {
                const existingItem = cart.find(item => item.product.id === activeProduct.id && item.size === selectedSize);
                if (existingItem) { existingItem.qty += qty; } else { cart.push({ product: activeProduct, size: selectedSize, qty: qty }); }
                saveCartToStorage(); updateCart(); closeModal(); toggleCartModal();
                showToast('カートに商品を追加しました');
            }
        }

        function removeFromCart(index) {
            cart.splice(index, 1); saveCartToStorage(); updateCart();
            showToast('カートから削除しました', 'error');
        }

        function saveCartToStorage() { localStorage.setItem('topland_cart', JSON.stringify(cart)); }

        function updateCart() {
            const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cart-count').innerText = totalQty;
            const container = document.getElementById('cart-list');
            container.innerHTML = '';

            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-gray-400 text-xs"><i class="fa-solid fa-basket-shopping text-xl mb-1 block"></i>カートは空です。</div>`;
                document.getElementById('order-string-input').value = "カートが空です";
                return;
            }

            let orderTokens = [];
            cart.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-2.5 bg-gray-50 p-2.5 rounded-xl border border-gray-100";
                div.innerHTML = `
                    <img src="${item.product.images[0] || 'https://placehold.co/400?text=No+Image'}" class="w-12 h-12 object-contain bg-white rounded-lg border border-gray-100 shrink-0">
                    <div class="grow min-w-0">
                        <h4 class="text-xs font-bold text-gray-900 truncate">${item.product.name}</h4>
                        <div class="flex items-center justify-between mt-1 gap-1">
                            <div class="flex items-center gap-1">
                                <span class="text-[9px] bg-gray-200 text-gray-700 px-1 py-0.5 rounded font-sans shrink-0">サイズ: ${item.size}</span>
                                <div class="flex items-center border border-gray-200 rounded-lg bg-white h-5 overflow-hidden ml-0.5">
                                    <button onclick="changeCartQty(${index}, -1)" class="w-4 h-full text-[10px] font-bold text-gray-500 hover:bg-gray-100">-</button>
                                    <span class="px-1.5 text-[10px] font-bold text-gray-800 min-w-[12px] text-center">${item.qty}</span>
                                    <button onclick="changeCartQty(${index}, 1)" class="w-4 h-full text-[10px] font-bold text-gray-500 hover:bg-gray-100">+</button>
                                </div>
                            </div>
                            <span class="text-xs text-amber-600 font-black tracking-tight shrink-0">${item.product.price}</span>
                        </div>
                    </div>
                    <button onclick="removeFromCart(${index})" class="text-gray-300 hover:text-red-500 w-8 h-8 flex items-center justify-center cursor-pointer shrink-0"><i class="fa-solid fa-trash-can text-xs"></i></button>
                `;
                container.appendChild(div);
                orderTokens.push(`[${item.product.id}]_${item.size}x${item.qty}`);
            });
            document.getElementById('order-string-input').value = `ORDER//${orderTokens.join('//')}`;
        }

        function copyOrderString() {
            const input = document.getElementById('order-string-input');
            if (cart.length === 0) return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(input.value).then(() => showToast('注文用コードをコピーしました！')).catch(() => fallbackCopy(input));
            } else { fallbackCopy(input); }
        }

        function fallbackCopy(input) {
            input.select(); input.setSelectionRange(0, 99999); document.execCommand('copy');
            showToast('注文用コードをコピーしました！');
        }

        function toggleCartModal() {
            const modal = document.getElementById('cart-modal');
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) {
                document.body.style.overflow = 'hidden';
            } else if (document.getElementById('product-modal').classList.contains('hidden')) {
                document.body.style.overflow = '';
            }
        }
    </script>
</body>
</html>
