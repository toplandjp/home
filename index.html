<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOPLAND</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .category-scroll::-webkit-scrollbar { height: 4px; }
        .category-scroll::-webkit-scrollbar-track { bg: #f1f1f1; }
        .category-scroll::-webkit-scrollbar-thumb { bg: #ddd; border-radius: 4px; }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        @media (max-width: 767px) {
            .modal-animate { transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
            .modal-active .modal-animate { transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#f8f9fa] text-gray-900 antialiased font-sans selection:bg-blue-500 selection:text-white">

    <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-99 flex flex-col gap-2 pointer-events-none w-[90%] max-w-sm"></div>

    <div class="bg-[#5865F2] text-white text-xs font-bold py-2.5 px-4 sticky top-0 z-55 shadow-sm flex justify-between items-center h-10">
        <div class="flex items-center gap-1.5 truncate">
            <i class="fa-brands fa-discord animate-bounce text-sm shrink-0"></i>
            <span class="truncate">注文・支払いはDiscordでのみ受付中！</span>
        </div>
        <a href="https://discord.gg/xbWMtzUbZB" target="_blank" class="bg-white text-[#5865F2] hover:bg-gray-100 px-3 py-1 rounded-full text-[11px] font-black transition-all shrink-0">参加する <i class="fa-solid fa-arrow-right text-[9px]"></i></a>
    </div>

    <header class="bg-white/90 border-b border-gray-100 sticky top-10 z-40 backdrop-blur-md shadow-xs">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-3">
            <a href="#" class="h-10 flex items-center shrink-0">
                <img src="https://i.ibb.co/Rp7DBNxZ/topland.png" alt="TOPLAND" class="h-full w-auto object-contain">
            </a>
            <div class="flex-1 max-w-sm hidden md:block">
                <div class="relative">
                    <input type="text" id="search-input" placeholder="キーワード、IDで検索..." class="w-full pl-9 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-xl text-xs focus:outline-hidden focus:ring-2 focus:ring-gray-950 focus:bg-white transition-all">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400 text-[11px]"></i>
                </div>
            </div>
            <a href="cart/" class="relative h-11 px-4 text-gray-800 hover:text-blue-600 transition-colors flex items-center justify-center gap-2 bg-gray-50 rounded-xl border border-gray-100 shadow-2xs">
                <i class="fa-solid fa-bag-shopping text-base"></i>
                <span class="text-xs font-bold">カート</span>
                <span id="cart-count" class="bg-gray-900 text-white text-[10px] font-black w-4 h-4 rounded-full flex items-center justify-center">0</span>
            </a>
        </div>
        <div class="px-4 pb-3 bg-white block md:hidden">
            <div class="relative">
                <input type="text" id="search-input-mobile" placeholder="商品名、ブランド、IDで検索..." class="w-full pl-9 pr-4 h-10 bg-gray-50 border border-gray-100 rounded-xl text-xs focus:outline-hidden focus:ring-2 focus:ring-gray-950">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-gray-400 text-[11px]"></i>
            </div>
            <div class="mt-2 border border-gray-200 rounded-xl overflow-hidden bg-gray-50">
                <button onclick="toggleMobileCategoryMenu()" class="w-full px-4 h-10 flex items-center justify-between text-xs font-bold text-gray-700 cursor-pointer select-none">
                    <span><i class="fa-solid fa-tags mr-1.5 text-gray-400"></i> ブランドから探す：<span id="mobile-current-category">すべて</span></span>
                    <i id="mobile-menu-arrow" class="fa-solid fa-chevron-down text-[10px] text-gray-400 transition-transform duration-200"></i>
                </button>
                <div id="mobile-category-dropdown" class="hidden border-t border-gray-200 bg-white p-2 flex flex-col gap-1">
                    <button onclick="filterCategory('すべて', this, true)" class="w-full text-left px-3 h-9 rounded-lg text-xs font-bold bg-gray-900 text-white mobile-cat-btn flex items-center gap-2">全て</button>
                    <div id="mobile-category-list" class="flex flex-col gap-1"></div>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-4 md:py-8 flex flex-col md:flex-row gap-4 md:gap-8">
        <aside class="w-full md:w-56 shrink-0 z-30 relative hidden md:block">
            <div class="bg-white md:rounded-2xl border border-gray-100 p-4 sticky top-26 flex md:flex-col gap-1.5">
                <div class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 px-1">Brands</div>
                <button onclick="filterCategory('すべて', this, false)" class="w-full text-left flex items-center gap-1.5 px-3.5 h-9 rounded-xl text-xs font-bold bg-gray-900 text-white pc-cat-btn transition-all">全て</button>
                <div id="pc-category-list" class="flex md:flex-col gap-1.5"></div>
            </div>
        </aside>

        <main class="grow">
            <div id="loading" class="text-center py-24 text-gray-400">
                <i class="fa-solid fa-spinner animate-spin text-2xl text-gray-950 mb-2"></i>
                <div class="text-xs font-medium">データを同期中...</div>
            </div>
            <div id="product-grid" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-5 hidden"></div>
            <div id="no-results" class="hidden text-center py-24 text-gray-400"><div class="text-xs">お探しの商品は見つかりませんでした。</div></div>
        </main>
    </div>

    <div id="product-modal" class="fixed inset-0 bg-black/60 z-50 flex items-end md:items-center justify-center p-0 md:p-4 backdrop-blur-xs transition-opacity duration-300 opacity-0 pointer-events-none hidden" onclick="closeModal()">
        <div class="modal-animate bg-white w-full md:max-w-4xl rounded-t-[2rem] md:rounded-3xl overflow-hidden shadow-2xl flex flex-col h-[85vh] md:h-auto md:max-h-[85vh] relative" onclick="event.stopPropagation()">
            <div id="modal-scroll-body" class="grow overflow-y-auto p-4 md:p-6 pb-26 md:pb-24">
                <div id="modal-step-1" class="flex flex-col md:flex-row gap-4 md:gap-6">
                    <div class="w-full md:w-1/2 flex flex-col shrink-0 relative">
                        <div class="w-full aspect-square max-h-[32vh] md:max-h-none overflow-hidden bg-gray-50 rounded-2xl relative flex items-center justify-center p-2 border border-gray-100">
                            <img id="modal-main-image" src="" onclick="openLightbox()" class="w-full h-full object-contain cursor-zoom-in">
                            <button onclick="prevImage()" class="absolute left-3 top-1/2 -translate-y-1/2 bg-black/30 text-white w-8 h-8 rounded-full flex items-center justify-center"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                            <button onclick="nextImage()" class="absolute right-3 top-1/2 -translate-y-1/2 bg-black/30 text-white w-8 h-8 rounded-full flex items-center justify-center"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                        </div>
                        <div id="modal-thumbnails" class="flex gap-1.5 mt-2 overflow-x-auto category-scroll py-1 justify-center"></div>
                    </div>
                    <div class="w-full md:w-1/2 flex flex-col justify-between space-y-4">
                        <div class="space-y-3.5">
                            <h2 id="modal-name" class="text-xl md:text-2xl font-black text-gray-900 leading-snug"></h2>
                            <div class="text-2xl md:text-3xl font-black text-amber-600 tracking-tight border-b border-gray-50 pb-2"><span id="price-text">¥0</span></div>
                            <div class="bg-slate-50 p-4 rounded-2xl border-l-4 border-gray-900 shadow-3xs">
                                <p id="modal-description" class="text-sm md:text-base text-gray-700 leading-relaxed whitespace-pre-wrap font-medium"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="modal-step-2" class="hidden max-w-md mx-auto py-2 md:py-6 space-y-6">
                    <button onclick="goToStep(1)" class="text-xs font-black text-gray-400 flex items-center gap-1.5 bg-gray-50 px-3 py-1.5 rounded-lg">商品詳細に戻る</button>
                    <div class="border-b border-gray-100 pb-4 flex items-center gap-3">
                        <img id="modal-step2-mini-img" src="" class="w-12 h-12 object-contain bg-gray-50 rounded-lg border border-gray-100">
                        <div>
                            <h3 id="modal-step2-name" class="text-sm font-black text-gray-900 truncate"></h3>
                            <div id="modal-step2-price" class="text-base font-black text-amber-600 mt-0.5">¥0</div>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <span class="text-xs font-black text-gray-500 block">サイズを選択</span>
                        <div id="modal-size-container" class="flex flex-wrap gap-2"></div>
                    </div>
                    <div class="space-y-2">
                        <span class="text-xs font-black text-gray-500 block">数量を選択</span>
                        <div class="flex items-center gap-1">
                            <button onclick="changeModalQty(-1)" class="w-11 h-11 border border-gray-200 rounded-xl font-bold bg-gray-50 text-lg">-</button>
                            <input type="number" id="modal-qty" value="1" min="1" readonly class="w-14 h-11 border border-gray-200 rounded-xl text-center font-black text-base bg-white">
                            <button onclick="changeModalQty(1)" class="w-11 h-11 border border-gray-200 rounded-xl font-bold bg-gray-50 text-lg">+</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="absolute bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md p-4 border-t border-gray-100 flex gap-2 z-20">
                <button onclick="closeModal()" class="w-1/4 bg-gray-100 text-gray-800 font-black h-12 rounded-xl text-xs md:hidden">閉じる</button>
                <button id="modal-primary-btn" onclick="handlePrimaryAction()" class="w-3/4 md:w-full bg-gray-900 text-white font-black h-12 rounded-xl flex items-center justify-center gap-2 text-xs md:text-sm shadow-lg">サイズ・数量を選ぶ <i class="fa-solid fa-chevron-right text-[10px]"></i></button>
            </div>
        </div>
    </div>

    <div id="lightbox-modal" class="fixed inset-0 bg-black/95 z-60 flex items-center justify-center p-4 backdrop-blur-md hidden transition-opacity duration-300 opacity-0" onclick="closeLightbox()">
        <button onclick="closeLightbox()" class="absolute top-4 right-4 text-white/70 text-2xl w-12 h-12 flex items-center justify-center bg-black/20 rounded-full"><i class="fa-solid fa-xmark"></i></button>
        <button onclick="event.stopPropagation(); prevImage();" class="absolute left-4 top-1/2 -translate-y-1/2 bg-white/10 text-white w-12 h-12 rounded-full flex items-center justify-center"><i class="fa-solid fa-chevron-left text-lg"></i></button>
        <div class="max-w-full max-h-[82vh] flex items-center justify-center p-2" onclick="event.stopPropagation()">
            <img id="lightbox-image" src="" class="max-w-full max-h-[82vh] object-contain rounded-xl shadow-2xl transition-all duration-300 cursor-zoom-out" onclick="closeLightbox()">
        </div>
        <button onclick="event.stopPropagation(); nextImage();" class="absolute right-4 top-1/2 -translate-y-1/2 bg-white/10 text-white w-12 h-12 rounded-full flex items-center justify-center"><i class="fa-solid fa-chevron-right text-lg"></i></button>
    </div>

    <script>
        const SPREADSHEET_ID = '1YwGSjOtNAsKnxCg6afUv2nZPG0h6d7VyFat1ai3w07A';
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=responseHandler:loadData`;
        let products = []; let cart = []; let currentCategory = 'すべて'; let searchQuery = ''; let activeProduct = null; let selectedSize = ''; let currentImageIdx = 0; let currentStep = 1;

        window.addEventListener('DOMContentLoaded', () => {
            updateCartCountOnly();
            const script = document.createElement('script'); script.src = url; document.body.appendChild(script);
            const searchHandler = (e) => { searchQuery = e.target.value; renderProducts(); };
            document.getElementById('search-input').addEventListener('input', searchHandler);
            document.getElementById('search-input-mobile').addEventListener('input', searchHandler);
        });

        function loadData(data) {
            try {
                const rows = data.table.rows; products = [];
                rows.forEach(row => {
                    const id = row.c[0] ? String(row.c[0].v).trim() : 'N/A';
                    const name = row.c[1] ? row.c[1].v : '';
                    const category = row.c[2] ? row.c[2].v : '';
                    const imageStr = row.c[3] ? row.c[3].v : '';
                    const price = row.c[4] ? row.c[4].v : '価格未定';
                    const description = row.c[5] ? row.c[5].v : '';
                    const sizesStr = row.c[6] ? String(row.c[6].v) : '';
                    const status = row.c[7] ? String(row.c[7].v).trim() : '非公開';
                    const images = imageStr.split(',').map(img => img.trim()).filter(img => img);
                    const sizes = sizesStr ? sizesStr.split(',').map(s => s.trim()).filter(s => s) : [];
                    if (name && name !== 'name' && status !== '非公開') products.push({ id, name, category, images, price, description, sizes, status });
                });
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('product-grid').classList.remove('hidden');
                initCategories(); renderProducts();
            } catch (e) { document.getElementById('loading').innerText = '同期に失敗しました。'; }
        }

        function cleanText(str) { if (!str) return ''; return String(str).toLowerCase().replace(/[！-～]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).trim(); }

        function renderProducts() {
            const grid = document.getElementById('product-grid'); const noResults = document.getElementById('no-results'); grid.innerHTML = '';
            const words = cleanText(searchQuery).split(/\s+/).filter(w => w);
            const filtered = products.filter(product => {
                const matchesCategory = (currentCategory === 'すべて' || product.category === currentCategory);
                if (!matchesCategory) return false;
                const targetText = cleanText(`${product.name} ${product.category} ${product.id} ${product.description}`);
                return words.every(word => targetText.includes(word));
            });
            if (filtered.length === 0) { noResults.classList.remove('hidden'); return; }
            noResults.classList.add('hidden');
            filtered.forEach(product => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl overflow-hidden border border-gray-100 active:scale-98 transition-all flex flex-col justify-between cursor-pointer group relative shadow-2xs";
                card.onclick = () => openModal(product);
                let statusBadge = product.status === '生産中・準備中' ? `<span class="absolute top-2 left-2 z-10 bg-amber-500 text-white text-[10px] font-black px-2.5 py-1 rounded-lg">準備中</span>` : '';
                card.innerHTML = `
                    <div>
                        <div class="aspect-square bg-gray-50 overflow-hidden relative flex items-center justify-center p-1">
                            ${statusBadge}<img src="${product.images[0] || 'https://placehold.co/400?text=No+Image'}" class="w-full h-full object-contain">
                        </div>
                        <div class="p-3">
                            <span class="text-[8px] font-black text-gray-400 uppercase tracking-widest block">${product.category}</span>
                            <h2 class="text-xs font-bold text-gray-900 mt-0.5 line-clamp-2 min-h-[2.2rem] leading-tight">${product.name}</h2>
                        </div>
                    </div>
                    <div class="p-3 pt-0 flex items-end justify-between">
                        <span class="text-base md:text-lg font-black text-amber-600 tracking-tight">${product.price}</span>
                        <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded">詳細</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function initCategories() {
            const pcList = document.getElementById('pc-category-list'); const mobileList = document.getElementById('mobile-category-list');
            pcList.innerHTML = ''; mobileList.innerHTML = '';
            const categories = [...new Set(products.map(p => p.category))].filter(Boolean);
            categories.forEach(cat => {
                const pcBtn = document.createElement('button'); pcBtn.onclick = () => filterCategory(cat, pcBtn, false);
                pcBtn.className = "w-full text-left flex items-center gap-1.5 px-3.5 h-9 rounded-xl text-xs font-medium text-gray-600 bg-gray-100 pc-cat-btn transition-all";
                pcBtn.innerHTML = `<i class="fa-solid fa-tag text-gray-400 text-[10px]"></i> ${cat}`; pcList.appendChild(pcBtn);
                const mobileBtn = document.createElement('button'); mobileBtn.onclick = () => filterCategory(cat, mobileBtn, true);
                mobileBtn.className = "w-full text-left px-3 h-9 rounded-lg text-xs font-medium text-gray-600 bg-gray-50 mobile-cat-btn flex items-center gap-2";
                mobileBtn.innerHTML = `<i class="fa-solid fa-tag text-gray-400 text-[11px]"></i> ${cat}`; mobileList.appendChild(mobileBtn);
            });
        }

        function toggleMobileCategoryMenu() {
            const dropdown = document.getElementById('mobile-category-dropdown'); const arrow = document.getElementById('mobile-menu-arrow');
            const isHidden = dropdown.classList.contains('hidden'); dropdown.classList.toggle('hidden');
            arrow.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function filterCategory(category, element, isMobile) {
            currentCategory = category;
            if (isMobile) {
                document.getElementById('mobile-current-category').innerText = category;
                document.querySelectorAll('.mobile-cat-btn').forEach(btn => btn.className = "w-full text-left px-3 h-9 rounded-lg text-xs font-medium text-gray-600 bg-gray-50 mobile-cat-btn flex items-center gap-2");
                element.className = "w-full text-left px-3 h-9 rounded-lg text-xs font-bold bg-gray-900 text-white mobile-cat-btn flex items-center gap-2";
                toggleMobileCategoryMenu();
            } else {
                document.querySelectorAll('.pc-cat-btn').forEach(btn => btn.className = "w-full text-left flex items-center gap-1.5 px-3.5 h-9 rounded-xl text-xs font-medium text-gray-600 bg-gray-100 pc-cat-btn transition-all");
                element.className = "w-full text-left flex items-center gap-1.5 px-3.5 h-9 rounded-xl text-xs font-bold bg-gray-900 text-white pc-cat-btn transition-all";
            }
            renderProducts();
        }

        function openModal(product) {
            activeProduct = product; selectedSize = ''; currentImageIdx = 0; document.getElementById('modal-qty').value = 1;
            updateModalImage();
            let nameHtml = `<span class="text-[10px] font-black tracking-widest text-blue-600 bg-blue-50 px-2 py-0.5 rounded uppercase inline-flex items-center mr-2 select-none align-middle">${product.category}</span>`;
            if (product.status === '生産中・準備中') nameHtml += `<span class="text-[10px] font-black tracking-wider text-amber-800 bg-amber-100 border border-amber-200 px-2 py-0.5 rounded-md inline-flex items-center mr-2 select-none align-middle">準備中</span>`;
            nameHtml += `<span class="align-middle text-gray-900 font-black">${product.name}</span>`;
            document.getElementById('modal-name').innerHTML = nameHtml;
            document.getElementById('price-text').innerText = product.price;
            document.getElementById('modal-description').innerText = product.description;
            const thumbContainer = document.getElementById('modal-thumbnails'); thumbContainer.innerHTML = '';
            product.images.forEach((imgUrl, idx) => {
                const img = document.createElement('img'); img.src = imgUrl;
                img.className = `w-11 h-11 object-contain bg-white rounded-lg border-2 shrink-0 transition-all ${idx === 0 ? 'border-gray-900 opacity-100 scale-105' : 'border-gray-100 opacity-60'}`;
                img.onclick = () => { currentImageIdx = idx; updateModalImage(); }; thumbContainer.appendChild(img);
            });
            document.getElementById('modal-step2-mini-img').src = product.images[0] || 'https://placehold.co/400?text=No+Image';
            document.getElementById('modal-step2-name').innerText = product.name;
            document.getElementById('modal-step2-price').innerText = product.price;
            const sizeContainer = document.getElementById('modal-size-container'); sizeContainer.innerHTML = '';
            if (product.sizes.length === 0) {
                sizeContainer.innerHTML = `<span class="text-xs font-bold text-gray-500 bg-gray-100 px-3 py-2 rounded-xl">フリーサイズ (FREE)</span>`; selectedSize = 'FREE';
            } else {
                product.sizes.forEach(size => {
                    const btn = document.createElement('button'); btn.innerText = size;
                    btn.className = "min-w-[46px] h-11 px-3.5 border border-gray-200 text-xs font-black rounded-xl size-btn flex items-center justify-center bg-white text-gray-800";
                    btn.onclick = () => {
                        sizeContainer.querySelectorAll('.size-btn').forEach(b => b.className = "min-w-[46px] h-11 px-3.5 border border-gray-200 text-xs font-black rounded-xl size-btn flex items-center justify-center bg-white text-gray-800");
                        btn.className = "min-w-[46px] h-11 px-3.5 bg-gray-900 border border-gray-900 text-white text-xs font-black rounded-xl size-btn shadow-md flex items-center justify-center scale-102";
                        selectedSize = size;
                    };
                    sizeContainer.appendChild(btn);
                });
            }
            goToStep(1);
            const modalEl = document.getElementById('product-modal'); modalEl.classList.remove('hidden');
            setTimeout(() => { modalEl.classList.add('modal-active'); modalEl.classList.remove('opacity-0'); modalEl.classList.add('opacity-100'); modalEl.style.pointerEvents = 'auto'; }, 10);
            document.body.style.overflow = 'hidden';
        }

        function goToStep(step) {
            currentStep = step; const step1 = document.getElementById('modal-step-1'); const step2 = document.getElementById('modal-step-2'); const primaryBtn = document.getElementById('modal-primary-btn');
            document.getElementById('modal-scroll-body').scrollTop = 0;
            if (activeProduct && activeProduct.status === '生産中・準備中') {
                primaryBtn.innerHTML = `ただいま準備中です`; primaryBtn.className = "w-3/4 md:w-full bg-gray-200 text-gray-400 font-bold h-12 rounded-xl flex items-center justify-center text-xs pointer-events-none";
                step1.classList.remove('hidden'); step2.classList.add('hidden'); return;
            }
            if (step === 1) {
                step1.classList.remove('hidden'); step2.classList.add('hidden'); primaryBtn.innerHTML = `サイズ・数量を選ぶ <i class="fa-solid fa-chevron-right text-[10px]"></i>`;
                primaryBtn.className = "w-3/4 md:w-full bg-gray-900 text-white font-black h-12 rounded-xl flex items-center justify-center gap-2 text-xs md:text-sm shadow-lg";
            } else {
                step1.classList.add('hidden'); step2.classList.remove('hidden'); primaryBtn.innerHTML = `<i class="fa-solid fa-plus text-xs"></i> カートに追加する`;
                primaryBtn.className = "w-3/4 md:w-full bg-blue-600 text-white font-black h-12 rounded-xl flex items-center justify-center gap-2 text-xs md:text-sm shadow-lg";
            }
        }

        function handlePrimaryAction() { if (currentStep === 1) { goToStep(2); } else { addToCart(); } }

        function updateModalImage() {
            if (!activeProduct || activeProduct.images.length === 0) {
                const noImg = 'https://placehold.co/400?text=No+Image'; document.getElementById('modal-main-image').src = noImg; document.getElementById('lightbox-image').src = noImg; return;
            }
            const targetSrc = activeProduct.images[currentImageIdx]; document.getElementById('modal-main-image').src = targetSrc; document.getElementById('lightbox-image').src = targetSrc;
            const thumbs = document.getElementById('modal-thumbnails').querySelectorAll('img');
            thumbs.forEach((t, idx) => {
                t.className = idx === currentImageIdx ? "w-11 h-11 object-contain bg-white rounded-lg border-2 border-gray-900 opacity-100 scale-105 shrink-0 transition-all" : "w-11 h-11 object-contain bg-white rounded-lg border-2 border-gray-100 opacity-50 shrink-0 transition-all";
            });
        }

        function nextImage() { if (!activeProduct || activeProduct.images.length <= 1) return; currentImageIdx = (currentImageIdx + 1) % activeProduct.images.length; updateModalImage(); }
        function prevImage() { if (!activeProduct || activeProduct.images.length <= 1) return; currentImageIdx = (currentImageIdx - 1 + activeProduct.images.length) % activeProduct.images.length; updateModalImage(); }
        function openLightbox() { if (!activeProduct || activeProduct.images.length === 0) return; const lightbox = document.getElementById('lightbox-modal'); lightbox.classList.remove('hidden'); setTimeout(() => { lightbox.classList.remove('opacity-0'); lightbox.classList.add('opacity-100'); }, 10); }
        function closeLightbox() { const lightbox = document.getElementById('lightbox-modal'); lightbox.classList.remove('opacity-100'); lightbox.classList.add('opacity-0'); setTimeout(() => lightbox.classList.add('hidden'), 300); }
        function changeModalQty(val) { const qtyInput = document.getElementById('modal-qty'); let nextVal = parseInt(qtyInput.value) + val; if (nextVal >= 1) qtyInput.value = nextVal; }
        function closeModal() { const modalEl = document.getElementById('product-modal'); modalEl.classList.remove('modal-active', 'opacity-100'); modalEl.classList.add('opacity-0'); modalEl.style.pointerEvents = 'none'; setTimeout(() => modalEl.classList.add('hidden'), 300); document.body.style.overflow = ''; }

        function addToCart() {
            if (!selectedSize) { alert('サイズを選択してください！'); return; }
            const qty = parseInt(document.getElementById('modal-qty').value);
            let currentCart = [];
            try { currentCart = JSON.parse(localStorage.getItem('topland_cart')) || []; } catch(e) { currentCart = []; }
            const existingItem = currentCart.find(item => item.product.id === activeProduct.id && item.size === selectedSize);
            if (existingItem) { existingItem.qty += qty; } else { currentCart.push({ product: activeProduct, size: selectedSize, qty: qty }); }
            localStorage.setItem('topland_cart', JSON.stringify(currentCart));
            
            // 追加したらカート専用ページ（cart/）へ即リダイレクト！
            location.href = 'cart/';
        }

        function updateCartCountOnly() {
            try {
                const currentCart = JSON.parse(localStorage.getItem('topland_cart')) || [];
                const totalQty = currentCart.reduce((sum, item) => sum + item.qty, 0);
                document.getElementById('cart-count').innerText = totalQty;
            } catch(e) { document.getElementById('cart-count').innerText = 0; }
        }
    </script>
</body>
</html>
